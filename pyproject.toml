[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maxtikzlib"
version = "0.1"
description = "Python interface to generate (readable) Tikz figures."
readme = "README.md"
requires-python = ">=3.8"
license = {file = "LICENSE.txt"}
keywords = ["python"]
authors = [{name = "Max"}]
classifiers = [
    "Development Status :: 3 - Alpha",
]
dependencies = [
    "matplotlib",
    "pymupdf",
    "fitz",
]

[project.optional-dependencies]
test = ["pytest", "coverage"]
dev = [
    "maxtikzlib[test]",
    "black[jupyter]",
    "isort",
    "ruff",
    "pytest",
    "pre-commit",
]

# https://medium.com/@pratikdomadiya123/build-project-documentation-quickly-with-the-sphinx-python-2a9732b66594
docs = [
  "ipykernel",
  "myst-parser",
  "nbconvert",
  "nbsphinx",
  "jupyterlab",
  "pre-commit",
  "pyproject-fmt",
  "sphinx",
  "sphinx-rtd-theme",
]

[project.urls]
"Source" = "https://github.com/max-models/maxtikzlib"

[tool.setuptools.packages.find]
where = ["src"]
