[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tikzpics"
version = "0.1.2"
description = "Python interface to generate (readable) Tikz figures."
readme = "README.md"
requires-python = ">=3.8"
license = {file = "LICENSE.txt"}
keywords = ["python"]
authors = [{name = "Max"}]
classifiers = [
    "Development Status :: 3 - Alpha",
]
dependencies = [
    "pymupdf",
]

[project.optional-dependencies]

dev = [
    "tikzpics[test]",
    "tikzpics[docs]",
    "black[jupyter]",
    "isort",
    "ruff",
    "pre-commit",
    "pyproject-fmt",
]

test = [
    "pytest",
    "coverage",
]

docs = [
  "myst-parser",
  "nbconvert",
  "nbsphinx",
  "sphinx",
  "sphinx-book-theme",
  "sphinxcontrib-mermaid",
  "sphinx-design",
  "jupyterlab",
  "ipykernel",
  "numpy",
  "scipy",
]

[project.urls]
"Source" = "https://github.com/max-models/tikzpics"

[tool.setuptools.packages.find]
where = ["src"]
