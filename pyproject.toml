[build-system]
build-backend = "setuptools.build_meta"

requires = [ "setuptools", "wheel" ]

[project]
name = "maxtikzlib"
version = "0.1"
description = "Python interface to generate (readable) Tikz figures."
readme = "README.md"
keywords = [ "python" ]
license = { file = "LICENSE.txt" }
authors = [ { name = "Max" } ]
requires-python = ">=3.8"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
    "matplotlib",
    "pymupdf",
]

[project.optional-dependencies]
test = ["pytest", "coverage"]
dev = [
    "maxtikzlib[test]",
    "black[jupyter]",
    "isort",
    "ruff",
    "pytest",
    "pre-commit",
]

# https://medium.com/@pratikdomadiya123/build-project-documentation-quickly-with-the-sphinx-python-2a9732b66594
docs = [
  "ipykernel",
  "myst-parser",
  "nbconvert",
  "nbsphinx",
  "jupyterlab",
  "pre-commit",
  "pyproject-fmt",
  "sphinx",
  "sphinx-rtd-theme",
  "scipy",
]
# https://medium.com/@pratikdomadiya123/build-project-documentation-quickly-with-the-sphinx-python-2a9732b66594
optional-dependencies.docs = [
  "ipykernel",
  "myst-parser",
  "nbconvert",
  "nbsphinx",
  "pre-commit",
  "pyproject-fmt",
  "sphinx",
  "sphinx-rtd-theme",
]

[project.urls]
"Source" = "https://github.com/max-models/maxtikzlib"

[tool.setuptools.packages.find]
where = ["src"]
