site_name: tikzfigure
site_description: A Python library to generate readable TikZ figures
repo_url: https://github.com/max-models/tikzfigure
repo_name: max-models/tikzfigure
edit_uri: edit/devel/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocs-jupyter:
      execute: true
      allow_errors: false
      include_requirejs: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source

exclude_docs: |
  hooks.py

hooks:
  - docs/hooks.py

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
      - Fundamentals:
          - Getting Started: tutorials/tutorial_01_getting_started.md
          - Styling: tutorials/tutorial_02_styling.md
          - Saving and Exporting: tutorials/tutorial_16_saving_and_exporting.md
      - Drawing:
          - Paths: tutorials/tutorial_03_paths.md
          - TikZ Primitives: tutorials/tutorial_04_primitives.md
          - Layers: tutorials/tutorial_05_layers.md
          - Loops: tutorials/tutorial_06_loops.md
          - Coordinates and Midpoints: tutorials/tutorial_07_coordinates_and_midpoints.md
      - 2D Plots:
          - Basics: tutorials/tutorial_11_2d_plots_basics.md
          - Styling: tutorials/tutorial_12_2d_plots_styling.md
          - Functions: tutorials/tutorial_13_2d_plots_functions.md
          - Subfigures and Grids: tutorials/tutorial_14_subfigures.md
          - Mixed Subfigures: tutorials/tutorial_15_mixed_subfigures.md
      - Advanced:
          - 3D Figures: tutorials/tutorial_08_3d_figures.md
          - Raw TikZ: tutorials/tutorial_09_raw_tikz.md
          - Math Expressions: tutorials/tutorial_10_math_expressions.md
          - Figure Configuration: tutorials/tutorial_17_figure_configuration.md
          - Shading and Patterns: tutorials/tutorial_18_shading_and_patterns.md
          - Opacity: tutorials/tutorial_19_opacity_and_transparency.md
          - Decorations: tutorials/tutorial_20_decorations.md
          - Advanced Styling: tutorials/tutorial_21_advanced_styling.md
      - Showcases:
          - Calendar: tutorials/tutorial_22_calendar.md
  - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
