site_name: tikzpics
site_description: A Python library to generate readable TikZ figures
repo_url: https://github.com/max-models/tikzpics
repo_name: max-models/tikzpics
edit_uri: edit/devel/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocs-jupyter:
      execute: true
      allow_errors: false
      include_requirejs: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source

exclude_docs: |
  hooks.py

hooks:
  - docs/hooks.py

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
    - Getting Started: tutorials/tutorial_01_getting_started.ipynb
    - Styling: tutorials/tutorial_02_styling.ipynb
    - Paths and Shapes: tutorials/tutorial_03_paths_and_shapes.ipynb
    - Layers: tutorials/tutorial_04_layers.ipynb
    - Loops: tutorials/tutorial_05_loops.ipynb
    - Coordinates and Midpoints: tutorials/tutorial_06_coordinates_and_midpoints.ipynb
    - 3D Figures: tutorials/tutorial_07_3d_figures.ipynb
    - Raw TikZ: tutorials/tutorial_08_raw_tikz.ipynb
    - Space-Filling Curves: tutorials/tutorial_09_space_filling_curves.ipynb
    - Calendar: tutorials/tutorial_10_calendar.ipynb
  - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
