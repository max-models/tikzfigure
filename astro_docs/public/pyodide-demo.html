<!DOCTYPE html>
<html>
<head>
  <title>Tikzfigure in Pyodide</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <h2>TikZ Code Generator (Pyodide)</h2>
  <div class="container">
    <div class="left">
      <label for="input">TikzFigure Python code:</label>
      <textarea id="input" rows="18">from tikzfigure import TikzFigure

fig = TikzFigure()
fig.add_node(x=0, y=0, content="A", fill="red")
fig.add_node(x=2, y=1, content="B", fill="blue")
fig.draw([(0, 0), (2, 1)])
tikz_code = fig.generate_tikz()
</textarea>
    </div>
    <div class="right">
      <label for="output">Generated TikZ code:</label>
      <pre id="output">Loading...</pre>
    </div>
  </div>
  <div style="margin-top: 1em; text-align: left; max-width: 1100px; margin-left: auto; margin-right: auto;">
    <button id="generate">Generate</button>
  </div>
</body>
</html>
