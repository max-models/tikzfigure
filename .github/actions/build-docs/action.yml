name: "Build Documentation"
description: "Build MkDocs documentation"
inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.10"
  strict:
    description: "Treat warnings as errors (--strict flag)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Check if pdflatex is available
      shell: bash
      run: |
        which pdflatex
        pdflatex --version

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[docs]"

    - name: Build MkDocs docs
      shell: bash
      run: |
        if [ "${{ inputs.strict }}" = "true" ]; then
          mkdocs build --strict
        else
          mkdocs build
        fi
