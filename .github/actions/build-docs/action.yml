name: "Build Documentation"
description: "Build Astro/Starlight documentation"
inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Check if pdflatex is available
      shell: bash
      run: |
        which pdflatex
        pdflatex --version

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[docs]"

    - name: Build tutorials (Quarto + Jupyter → Markdown)
      shell: bash
      run: python astro_docs/scripts/build_tutorials.py --serial

    - name: Build and upload site
      uses: withastro/action@v5
      with:
        path: astro_docs

    - name: Rebuild without base path for local artifact inspection
      shell: bash
      working-directory: astro_docs
      run: npx astro build --base /
