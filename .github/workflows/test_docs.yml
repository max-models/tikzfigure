name: Test Documentation Build

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel

defaults:
  run:
    shell: bash

jobs:
  build-tutorial-shards:
    strategy:
      fail-fast: false
      matrix:
        tutorial-dir: [fundamentals, drawing, plots, advanced, showcases, integrations]

    runs-on: ubuntu-latest
    container:
      image: ghcr.io/max-models/tikzpics/texlive-quarto:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tutorial directory
        uses: ./.github/actions/build-docs
        with:
          python-version: "3.12"
          build-site: "false"
          tutorial-build-args: --serial --directory ${{ matrix.tutorial-dir }}

      - name: Upload tutorial directory artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tutorials-dir-${{ matrix.tutorial-dir }}
          path: |
            astro_docs/src/content/docs/tutorials/
            astro_docs/public/tutorials/
          retention-days: 7

  test-docs:
    needs: build-tutorial-shards
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/max-models/tikzpics/texlive-quarto:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tutorial directory artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tutorials-dir-*
          path: astro_docs
          merge-multiple: true

      - name: Build documentation
        uses: ./.github/actions/build-docs
        with:
          python-version: "3.12"
          build-tutorials: "false"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: documentation
          path: astro_docs/dist/
          retention-days: 7
