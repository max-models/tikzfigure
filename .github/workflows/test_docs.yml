name: Test Documentation Build

on:
  push:
    branches:
      - main
      - devel
  pull_request:
    branches:
      - main
      - devel

defaults:
  run:
    shell: bash

jobs:
  test-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/max-models/tikzfigure/texlive-quarto:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build documentation
        uses: ./.github/actions/build-docs
        with:
          python-version: "3.10"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: documentation
          path: astro_docs/dist/
          retention-days: 7
