<!DOCTYPE html>
<html>
<head>
  <title>Tikzfigure in Pyodide</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script defer src="app.js"></script>
</head>
<body>
  <h2>TikZ Code Generator (Pyodide)</h2>
    <div class="container">
      <div class="left">
        <label for="input">TikzFigure Python code:</label>
        <textarea id="input" rows="18">from tikzfigure import TikzFigure

fig = TikzFigure()
n1 = fig.add_node(x=0, y=0, content="A", fill="red")
n2 = fig.add_node(x=2, y=1, content="B", fill="blue")
fig.draw([n1, n2])
  </textarea>
      </div>
      <div class="right">
        <label for="output">Generated TikZ code:</label>
        <pre id="output">Loading...</pre>
      </div>
    </div>
    <div style="margin-top: 1em; text-align: left; max-width: 1100px; margin-left: auto; margin-right: auto;">
      <button id="generate">Generate</button>
    </div>
    <script type="text/javascript">
      let pyodideReadyPromise = loadPyodide();
      let pyodideInstance = null;
      async function ensurePyodide() {
        if (!pyodideInstance) {
          pyodideInstance = await pyodideReadyPromise;
          await pyodideInstance.loadPackage('micropip');
          await pyodideInstance.runPythonAsync(`
  import micropip
  await micropip.install("tikzfigure")
          `);
        }
        return pyodideInstance;
      }

      async function generateTikz() {
        const userCode = document.getElementById("input").value;
        const code = `import sys\nfrom io import StringIO\nsys.stdout = mystdout = StringIO()\n` + userCode + `\nprint(fig)\nresult = mystdout.getvalue()`;
        const pyodide = await ensurePyodide();
        try {
          await pyodide.runPythonAsync(code);
          let result = pyodide.globals.get('result');
          document.getElementById("output").textContent = result;
        } catch (err) {
          document.getElementById("output").textContent = "Error: " + err;
        }
      }

      document.getElementById("generate").onclick = generateTikz;
      // Generate once on load
      window.onload = generateTikz;
    </script>
</body>
</html>
